feature: arquivar_email
priority: P0
category: email-server/pastas
description: |
  O usuário pode arquivar emails para removê-los da caixa de entrada
  sem excluí-los, mantendo-os acessíveis na pasta Arquivo.

given:
  - description: "Usuário está lendo um email na caixa de entrada"
    setup:
      view: leitura_email
      email_localizacao: "Caixa de entrada"

when:
  - description: "Clica no botão 'Arquivar'"
    action:
      click: botao_arquivar

then:
  - description: "Email é removido da caixa de entrada"
    check:
      email_ausente:
        pasta: "Caixa de entrada"
        email_id: arquivado
  - description: "Email aparece na pasta 'Arquivo'"
    check:
      email_presente:
        pasta: "Arquivo"
        email_id: arquivado
  - description: "Email mantém seu estado (lido/não lido)"
    check:
      estado_preservado: true

invariants:
  - "Arquivar é uma ação de um clique, sem confirmação adicional"
  - "Emails arquivados podem ser desarquivados movendo-os de volta"
